version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mechmate-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: mechmate
      POSTGRES_PASSWORD: mechmate_secret
      POSTGRES_DB: mechmate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mechmate']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mechmate-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend API
  backend:
    build:
      context: ./backend
      target: development
    container_name: mechmate-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      PORT: '3000'
      NODE_ENV: development
      DATABASE_TYPE: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: mechmate
      DATABASE_PASSWORD: mechmate_secret
      DATABASE_DATABASE: mechmate
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: mechmate_jwt_secret_change_in_production
      FIREBASE_AUTH_DEV_MODE: 'true'
      CORS_ORIGIN: '*'
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:dev

volumes:
  postgres_data:
  redis_data:
